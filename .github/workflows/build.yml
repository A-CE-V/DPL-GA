name: Build Launcher

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID (VITE_GAME_ID)"
        required: true
        type: string
      uid:
        description: "Firebase UID of the dev who triggered the build"
        required: true
        type: string

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest

          - platform: macos
            runner: macos-latest

          - platform: linux
            runner: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Linux dependencies ────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ── 5. Rust cache ────────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Write .env ────────────────────────────────────────────────────────
      - name: Write .env
        shell: bash
        run: |
          cat > .env << ENVEOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_ID=${{ github.event.inputs.game_id }}
          ENVEOF

      # ── 7. Install JS dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 8. Install Tauri CLI ─────────────────────────────────────────────────
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 9. Build ─────────────────────────────────────────────────────────────
      - name: Build
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Find artifact + ZIP (Windows) ────────────────────────────────────
      # FIX: zip command does not exist on Windows runners.
      # Use PowerShell Compress-Archive instead.
      - name: Find and ZIP artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== Bundle tree ==="
          Get-ChildItem -Recurse "src-tauri\target\release\bundle" -ErrorAction SilentlyContinue | Select-Object FullName

          # Find NSIS installer first, fall back to MSI
          $artifact = Get-ChildItem -Recurse "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $artifact) {
            $artifact = Get-ChildItem -Recurse "src-tauri\target\release\bundle\msi" -Filter "*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if (-not $artifact) {
            Write-Error "ERROR: No artifact found for Windows"
            exit 1
          }

          Write-Host "Found: $($artifact.FullName)"

          $zipName = "launcher-${{ github.event.inputs.game_id }}-windows.zip"
          Compress-Archive -Path $artifact.FullName -DestinationPath $zipName -Force

          $size = (Get-Item $zipName).Length
          Write-Host "ZIP: $zipName ($size bytes)"

          # Set env for next steps
          "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── 11. Find artifact + ZIP (macOS / Linux) ───────────────────────────────
      - name: Find and ZIP artifact (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          echo "=== Bundle tree ==="
          find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null | sort
          echo "==================="

          ARTIFACT=""

          if [ "${{ matrix.platform }}" = "macos" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/macos/*.app" -type d 2>/dev/null | head -1)
            fi

          elif [ "${{ matrix.platform }}" = "linux" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/appimage/*.AppImage" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/deb/*.deb" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No artifact found for ${{ matrix.platform }}"
            exit 1
          fi

          echo "Found: $ARTIFACT"

          ZIP_NAME="launcher-${{ github.event.inputs.game_id }}-${{ matrix.platform }}.zip"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            chmod +x "$ARTIFACT"
          fi

          if [[ "$ARTIFACT" == *.app ]]; then
            zip -r "$ZIP_NAME" "$ARTIFACT"
          else
            zip -j "$ZIP_NAME" "$ARTIFACT"
          fi

          SIZE=$(wc -c < "$ZIP_NAME")
          echo "ZIP: $ZIP_NAME ($SIZE bytes)"
          echo "zip_path=$ZIP_NAME" >> $GITHUB_ENV

      # ── 12. Upload to R2 (Windows) ────────────────────────────────────────────
      # FIX: head -n -1 is Linux-only. On Windows we use PowerShell + curl.
      - name: Upload to R2 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $zipPath = "${{ env.zip_path }}"
          $gameId  = "${{ github.event.inputs.game_id }}"
          $secret  = "${{ secrets.WORKER_SECRET }}"
          $url     = "${{ secrets.WORKER_URL }}/upload/windows"

          $response = curl.exe -s -o response_body.txt -w "%{http_code}" `
            -X POST `
            -H "X-Worker-Secret: $secret" `
            -F "game_id=$gameId" `
            -F "file=@$zipPath;type=application/zip" `
            $url

          $body = Get-Content response_body.txt -Raw
          Write-Host "Worker response ($response): $body"

          if ($response -ne "201") {
            Write-Error "ERROR: Upload failed with HTTP $response"
            exit 1
          }

          Write-Host "Upload successful!"

      # ── 13. Upload to R2 (Unix) ───────────────────────────────────────────────
      # FIX: use a temp file for the body instead of head -n -1
      # head -n -1 is GNU-only and fails on macOS's BSD head.
      - name: Upload to R2 (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ZIP_PATH="${{ env.zip_path }}"
          GAME_ID="${{ github.event.inputs.game_id }}"
          PLATFORM="${{ matrix.platform }}"
          SECRET="${{ secrets.WORKER_SECRET }}"
          WORKER_URL="${{ secrets.WORKER_URL }}"

          # Write body to file, capture HTTP code separately — avoids head -n -1
          HTTP_CODE=$(curl -s \
            -o response_body.txt \
            -w "%{http_code}" \
            -X POST \
            -H "X-Worker-Secret: $SECRET" \
            -F "game_id=$GAME_ID" \
            -F "file=@$ZIP_PATH;type=application/zip" \
            "$WORKER_URL/upload/$PLATFORM")

          BODY=$(cat response_body.txt)
          echo "Worker response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Upload successful!"

      # ── 14. Notify Worker — success ───────────────────────────────────────────
      - name: Notify Worker — success
        if: success()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"success\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"

      # ── 15. Notify Worker — failure ───────────────────────────────────────────
      - name: Notify Worker — failure
        if: failure()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"failed\",\"error\":\"Build failed. Check Actions log.\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"
# Deploy Launcher — Build Pipeline
# Phase 12: Cross-platform launcher build via GitHub Actions
#
# Triggered by the dashboard via GitHub API (workflow_dispatch).
# Builds Windows (.exe), macOS (.dmg), and Linux (.AppImage) simultaneously.
# Uploads each artifact as a ZIP to Cloudflare R2 via the Worker.
#
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#   VITE_FIREBASE_API_KEY
#   VITE_FIREBASE_AUTH_DOMAIN
#   VITE_FIREBASE_PROJECT_ID
#   VITE_FIREBASE_MESSAGING_SENDER_ID
#   VITE_FIREBASE_APP_ID
#   WORKER_URL          — e.g. https://deploy-launcher-worker.xxx.workers.dev
#   WORKER_SECRET       — same secret set in the Worker

name: Build Launcher

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID (VITE_GAME_ID)"
        required: true
        type: string
      uid:
        description: "Firebase UID of the dev who triggered the build"
        required: true
        type: string

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false   # if one platform fails, keep building the others
      matrix:
        include:
          - platform: windows
            runner:   windows-latest
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            artifact_glob_alt: "src-tauri/target/release/bundle/msi/*.msi"
            artifact_ext: exe

          - platform: macos
            runner:   macos-latest
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"
            artifact_glob_alt: ""
            artifact_ext: dmg

          - platform: linux
            runner:   ubuntu-latest
            artifact_glob: "src-tauri/target/release/bundle/appimage/*.AppImage"
            artifact_glob_alt: "src-tauri/target/release/bundle/deb/*.deb"
            artifact_ext: AppImage

    steps:
      # ── 1. Checkout launcher template ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Linux system dependencies ───────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── 3. Set up Node.js ──────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Set up Rust ─────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── 5. Cache Rust build artifacts ──────────────────────────────────────
      # Dramatically speeds up subsequent builds (first build: ~15 min, cached: ~4 min)
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Write .env file with secrets + game_id ─────────────────────────
      - name: Write .env
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_ID=${{ github.event.inputs.game_id }}
          EOF

      # ── 7. Install JS dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 8. Install Tauri CLI ───────────────────────────────────────────────
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 9. Install zip (Windows only) ─────────────────────────────────────
      - name: Install zip (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: choco install zip -y

      # ── 10. Build macOS universal binary (Intel + Apple Silicon) ──────────
      - name: Build (macOS universal)
        if: matrix.platform == 'macos'
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── 11. Build (Windows / Linux) ────────────────────────────────────────
      - name: Build
        if: matrix.platform != 'macos'
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      # ── 12. Find the built artifact ────────────────────────────────────────
      - name: Find artifact
        id: find_artifact
        shell: bash
        run: |
          # Try primary glob first, then alt
          ARTIFACT=$(ls ${{ matrix.artifact_glob }} 2>/dev/null | head -1)
          if [ -z "$ARTIFACT" ] && [ -n "${{ matrix.artifact_glob_alt }}" ]; then
            ARTIFACT=$(ls ${{ matrix.artifact_glob_alt }} 2>/dev/null | head -1)
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No artifact found matching ${{ matrix.artifact_glob }}"
            echo "Contents of bundle directory:"
            ls -la src-tauri/target/release/bundle/ || true
            exit 1
          fi

          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT
          echo "Found: $ARTIFACT"

      # ── 13. ZIP the artifact ───────────────────────────────────────────────
      - name: ZIP artifact
        shell: bash
        run: |
          ARTIFACT="${{ steps.find_artifact.outputs.artifact_path }}"
          BASENAME="${{ steps.find_artifact.outputs.artifact_name }}"
          ZIP_NAME="launcher-${{ github.event.inputs.game_id }}-${{ matrix.platform }}.zip"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            chmod +x "$ARTIFACT"
          fi

          zip -j "$ZIP_NAME" "$ARTIFACT"

          SIZE=$(stat -f%z "$ZIP_NAME" 2>/dev/null || stat -c%s "$ZIP_NAME")
          echo "zip_path=$ZIP_NAME" >> $GITHUB_ENV
          echo "zip_size=$SIZE" >> $GITHUB_ENV
          echo "ZIP created: $ZIP_NAME ($SIZE bytes)"

      # ── 14. Upload ZIP to Cloudflare R2 via Worker ────────────────────────
      - name: Upload to R2
        shell: bash
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -F "game_id=${{ github.event.inputs.game_id }}" \
            -F "file=@${{ env.zip_path }};type=application/zip" \
            "${{ secrets.WORKER_URL }}/upload/${{ matrix.platform }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Worker response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Upload successful!"

      # ── 15. Notify Worker of completion (success) ─────────────────────────
      - name: Notify Worker — success
        if: success()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "gameId":   "${{ github.event.inputs.game_id }}",
              "platform": "${{ matrix.platform }}",
              "status":   "success"
            }' \
            "${{ secrets.WORKER_URL }}/internal/build-complete"

      # ── 16. Notify Worker of completion (failure) ─────────────────────────
      - name: Notify Worker — failure
        if: failure()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "gameId":   "${{ github.event.inputs.game_id }}",
              "platform": "${{ matrix.platform }}",
              "status":   "failed",
              "error":    "Build or upload failed. Check the Actions log for details."
            }' \
            "${{ secrets.WORKER_URL }}/internal/build-complete"
name: Build Launcher

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID (VITE_GAME_ID)"
        required: true
        type: string
      uid:
        description: "Firebase UID of the dev who triggered the build"
        required: true
        type: string

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest

          - platform: macos
            runner: macos-latest

          - platform: linux
            runner: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Linux system dependencies ───────────────────────────────────────
      # FIX: Ubuntu 24.04 runners have libappindicator3-1 pre-installed.
      # It directly conflicts with libayatana-appindicator3-dev.
      # We must force-remove the old packages before installing ayatana.
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get remove -y \
            libappindicator3-1 \
            libappindicator3-dev \
            gir1.2-appindicator3-0.1 \
            2>/dev/null || true
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── 3. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Rust ────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── 5. Rust cache ──────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Write .env ──────────────────────────────────────────────────────
      - name: Write .env
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_ID=${{ github.event.inputs.game_id }}
          EOF

      # ── 7. Install JS dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 8. Install Tauri CLI ───────────────────────────────────────────────
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 9. Build macOS universal binary ───────────────────────────────────
      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Build Windows / Linux ──────────────────────────────────────────
      - name: Build
        if: matrix.platform != 'macos'
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Find artifact ──────────────────────────────────────────────────
      # Uses find instead of glob — works regardless of exact path.
      # Prints full bundle tree so failures are easy to diagnose.
      - name: Find artifact
        id: find_artifact
        shell: bash
        run: |
          echo "=== Full bundle tree ==="
          find src-tauri/target -name "bundle" -type d 2>/dev/null | while read d; do
            echo "--- $d ---"
            find "$d" -type f 2>/dev/null | head -40
          done
          echo "========================"

          ARTIFACT=""

          if [ "${{ matrix.platform }}" = "windows" ]; then
            ARTIFACT=$(find src-tauri/target/release/bundle -name "*.exe" -o -name "*.msi" 2>/dev/null | grep -v "\.nsis\." | head -1)

          elif [ "${{ matrix.platform }}" = "macos" ]; then
            # Universal binary outputs to universal-apple-darwin/release/bundle
            ARTIFACT=$(find src-tauri/target/universal-apple-darwin/release/bundle -name "*.dmg" 2>/dev/null | head -1)
            # Fallback to regular release path
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target/release/bundle -name "*.dmg" 2>/dev/null | head -1)
            fi

          elif [ "${{ matrix.platform }}" = "linux" ]; then
            ARTIFACT=$(find src-tauri/target/release/bundle -name "*.AppImage" 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target/release/bundle -name "*.deb" 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No artifact found for platform ${{ matrix.platform }}"
            exit 1
          fi

          echo "Found: $ARTIFACT"
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      # ── 12. ZIP artifact ───────────────────────────────────────────────────
      - name: ZIP artifact
        shell: bash
        run: |
          ARTIFACT="${{ steps.find_artifact.outputs.artifact_path }}"
          ZIP_NAME="launcher-${{ github.event.inputs.game_id }}-${{ matrix.platform }}.zip"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            chmod +x "$ARTIFACT"
          fi

          zip -j "$ZIP_NAME" "$ARTIFACT"

          SIZE=$(stat -f%z "$ZIP_NAME" 2>/dev/null || stat -c%s "$ZIP_NAME")
          echo "zip_path=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP: $ZIP_NAME ($SIZE bytes)"

      # ── 13. Upload to R2 ───────────────────────────────────────────────────
      - name: Upload to R2
        shell: bash
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -F "game_id=${{ github.event.inputs.game_id }}" \
            -F "file=@${{ env.zip_path }};type=application/zip" \
            "${{ secrets.WORKER_URL }}/upload/${{ matrix.platform }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Worker response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Upload successful!"

      # ── 14. Notify Worker — success ────────────────────────────────────────
      - name: Notify Worker — success
        if: success()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"success\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"

      # ── 15. Notify Worker — failure ────────────────────────────────────────
      - name: Notify Worker — failure
        if: failure()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"failed\",\"error\":\"Build or upload failed. Check the Actions log.\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"
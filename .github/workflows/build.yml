name: Build Launcher

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID (VITE_GAME_ID)"
        required: true
        type: string
      uid:
        description: "Firebase UID of the dev who triggered the build"
        required: true
        type: string

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            artifact_glob: "src-tauri/target/release/bundle/nsis/*.exe"
            artifact_glob_alt: "src-tauri/target/release/bundle/msi/*.msi"

          - platform: macos
            runner: macos-latest
            # Universal binary goes to universal-apple-darwin, not release/
            artifact_glob: "src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg"
            artifact_glob_alt: "src-tauri/target/release/bundle/dmg/*.dmg"

          - platform: linux
            runner: ubuntu-latest
            artifact_glob: "src-tauri/target/release/bundle/appimage/*.AppImage"
            artifact_glob_alt: "src-tauri/target/release/bundle/deb/*.deb"

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Linux system dependencies ───────────────────────────────────────
      # FIX: removed libappindicator3-dev — conflicts with libayatana on Ubuntu 24.04
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── 3. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Rust ────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # ── 5. Rust cache ──────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Write .env ──────────────────────────────────────────────────────
      - name: Write .env
        shell: bash
        run: |
          cat > .env << 'EOF'
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_ID=${{ github.event.inputs.game_id }}
          EOF

      # ── 7. Install JS dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 8. Install Tauri CLI ───────────────────────────────────────────────
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 9. Build macOS universal ───────────────────────────────────────────
      - name: Build (macOS universal)
        if: matrix.platform == 'macos'
        run: npm run tauri build -- --target universal-apple-darwin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Build Windows / Linux ──────────────────────────────────────────
      - name: Build
        if: matrix.platform != 'macos'
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 11. Find artifact ──────────────────────────────────────────────────
      - name: Find artifact
        id: find_artifact
        shell: bash
        run: |
          echo "Searching for artifact..."

          ARTIFACT=$(ls ${{ matrix.artifact_glob }} 2>/dev/null | head -1)

          if [ -z "$ARTIFACT" ] && [ -n "${{ matrix.artifact_glob_alt }}" ]; then
            echo "Primary glob found nothing, trying alt..."
            ARTIFACT=$(ls ${{ matrix.artifact_glob_alt }} 2>/dev/null | head -1)
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No artifact found."
            echo "=== Bundle directory contents ==="
            find src-tauri/target -name "bundle" -type d 2>/dev/null | while read d; do
              echo "--- $d ---"
              ls -la "$d" 2>/dev/null || true
              ls -la "$d"/*/ 2>/dev/null || true
            done
            exit 1
          fi

          echo "Found artifact: $ARTIFACT"
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      # ── 12. ZIP artifact ───────────────────────────────────────────────────
      - name: ZIP artifact
        shell: bash
        run: |
          ARTIFACT="${{ steps.find_artifact.outputs.artifact_path }}"
          ZIP_NAME="launcher-${{ github.event.inputs.game_id }}-${{ matrix.platform }}.zip"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            chmod +x "$ARTIFACT"
          fi

          zip -j "$ZIP_NAME" "$ARTIFACT"

          SIZE=$(stat -f%z "$ZIP_NAME" 2>/dev/null || stat -c%s "$ZIP_NAME")
          echo "zip_path=$ZIP_NAME" >> $GITHUB_ENV
          echo "zip_size=$SIZE" >> $GITHUB_ENV
          echo "ZIP: $ZIP_NAME ($SIZE bytes)"

      # ── 13. Upload to R2 ───────────────────────────────────────────────────
      - name: Upload to R2
        shell: bash
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -F "game_id=${{ github.event.inputs.game_id }}" \
            -F "file=@${{ env.zip_path }};type=application/zip" \
            "${{ secrets.WORKER_URL }}/upload/${{ matrix.platform }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Worker response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Upload successful!"

      # ── 14. Notify Worker — success ────────────────────────────────────────
      - name: Notify Worker — success
        if: success()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "gameId":   "${{ github.event.inputs.game_id }}",
              "platform": "${{ matrix.platform }}",
              "status":   "success"
            }' \
            "${{ secrets.WORKER_URL }}/internal/build-complete"

      # ── 15. Notify Worker — failure ────────────────────────────────────────
      - name: Notify Worker — failure
        if: failure()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{
              "gameId":   "${{ github.event.inputs.game_id }}",
              "platform": "${{ matrix.platform }}",
              "status":   "failed",
              "error":    "Build or upload failed. Check the Actions log."
            }' \
            "${{ secrets.WORKER_URL }}/internal/build-complete"
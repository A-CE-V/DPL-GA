name: Build Launcher

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID (VITE_GAME_ID)"
        required: true
        type: string
      uid:
        description: "Firebase UID of the dev who triggered the build"
        required: true
        type: string

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest

          - platform: macos
            runner: macos-latest

          - platform: linux
            runner: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Linux dependencies ────────────────────────────────────────────────
      # NOTE: No libayatana / libappindicator needed — Cargo.toml has no tray feature.
      # Using ubuntu-22.04 runner avoids the Noble/ayatana conflict entirely.
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ── 5. Rust cache ────────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Write .env ────────────────────────────────────────────────────────
      - name: Write .env
        shell: bash
        run: |
          cat > .env << ENVEOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_ID=${{ github.event.inputs.game_id }}
          ENVEOF

      # ── 7. Install JS dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 8. Install Tauri CLI ─────────────────────────────────────────────────
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 9. Build ─────────────────────────────────────────────────────────────
      # macOS: native arch only (no universal — simpler and more reliable in CI)
      # Windows/Linux: standard build
      - name: Build
        shell: bash
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Find artifact ────────────────────────────────────────────────────
      # Uses recursive find — works regardless of exact Tauri output path.
      # Prints tree first so any failure is immediately diagnosable.
      - name: Find artifact
        id: find_artifact
        shell: bash
        run: |
          echo "=== Bundle tree ==="
          find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null | sort
          echo "==================="

          ARTIFACT=""

          if [ "${{ matrix.platform }}" = "windows" ]; then
            # Prefer NSIS installer, fall back to MSI
            ARTIFACT=$(find src-tauri/target -path "*/bundle/nsis/*.exe" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/msi/*.msi" -type f 2>/dev/null | head -1)
            fi

          elif [ "${{ matrix.platform }}" = "macos" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/macos/*.app" -maxdepth 8 -type d 2>/dev/null | head -1)
            fi

          elif [ "${{ matrix.platform }}" = "linux" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/appimage/*.AppImage" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/deb/*.deb" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No artifact found for ${{ matrix.platform }}"
            exit 1
          fi

          echo "Found: $ARTIFACT"
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      # ── 11. ZIP artifact ─────────────────────────────────────────────────────
      - name: ZIP artifact
        shell: bash
        run: |
          ARTIFACT="${{ steps.find_artifact.outputs.artifact_path }}"
          ZIP_NAME="launcher-${{ github.event.inputs.game_id }}-${{ matrix.platform }}.zip"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            chmod +x "$ARTIFACT"
          fi

          # .app bundles are directories — zip the whole folder
          if [[ "$ARTIFACT" == *.app ]]; then
            zip -r "$ZIP_NAME" "$ARTIFACT"
          else
            zip -j "$ZIP_NAME" "$ARTIFACT"
          fi

          SIZE=$(stat -f%z "$ZIP_NAME" 2>/dev/null || stat -c%s "$ZIP_NAME")
          echo "zip_path=$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP: $ZIP_NAME ($SIZE bytes)"

      # ── 12. Upload to R2 ─────────────────────────────────────────────────────
      - name: Upload to R2
        shell: bash
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -F "game_id=${{ github.event.inputs.game_id }}" \
            -F "file=@${{ env.zip_path }};type=application/zip" \
            "${{ secrets.WORKER_URL }}/upload/${{ matrix.platform }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Worker response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Upload successful!"

      # ── 13. Notify Worker — success ───────────────────────────────────────────
      - name: Notify Worker — success
        if: success()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"success\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"

      # ── 14. Notify Worker — failure ───────────────────────────────────────────
      - name: Notify Worker — failure
        if: failure()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"failed\",\"error\":\"Build failed. Check Actions log.\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"
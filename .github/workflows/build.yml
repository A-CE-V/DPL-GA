name: Build Launcher

on:
  workflow_dispatch:
    inputs:
      game_id:
        description: "Game ID (VITE_GAME_ID)"
        required: true
        type: string
      uid:
        description: "Firebase UID of the dev who triggered the build"
        required: true
        type: string

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            min_size_bytes: 1000000      # 1 MB — NSIS w/ downloadBootstrapper is legitimately small

          - platform: macos
            runner: macos-latest
            min_size_bytes: 2000000      # 2 MB — catches a truncated/corrupt DMG from hdiutil flakiness

          - platform: linux
            runner: ubuntu-22.04
            min_size_bytes: 30000000     # 30 MB — AppImage bundles full WebKitGTK, always large

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Linux dependencies ────────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev

      # ── 3. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Rust ──────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ── 5. Rust cache ────────────────────────────────────────────────────────
      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Write .env ────────────────────────────────────────────────────────
      - name: Write .env
        shell: bash
        run: |
          cat > .env << ENVEOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_GAME_ID=${{ github.event.inputs.game_id }}
          ENVEOF

      # ── 7. Install JS dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 8. Install Tauri CLI ─────────────────────────────────────────────────
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # ── 9. Build (Windows / Linux — single attempt, these don't have the
      #         hdiutil flakiness that macOS has) ──────────────────────────────
      - name: Build
        if: matrix.platform != 'macos'
        run: npm run tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9b. Build (macOS — with retry) ───────────────────────────────────────
      # FIX: Tauri's bundle_dmg.sh occasionally fails on GitHub's macOS runners
      # due to a well-known hdiutil race condition (the disk image creation
      # step intermittently fails or produces a truncated DMG under CI
      # conditions). This is a documented, widely-reported flaky failure in
      # the Tauri community — not something wrong with our config. Simply
      # retrying the build is the standard, recommended workaround, since
      # re-runs succeed the vast majority of the time.
      - name: Build (macOS, with retry)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "=== Build attempt $attempt/$MAX_ATTEMPTS ==="
            if npm run tauri build; then
              echo "Build succeeded on attempt $attempt"
              exit 0
            fi
            echo "Build failed on attempt $attempt"
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Cleaning up partial bundle output before retry..."
              rm -rf src-tauri/target/release/bundle/dmg
              rm -rf src-tauri/target/release/bundle/macos
              echo "Waiting 15s before retry (lets any hdiutil lock release)..."
              sleep 15
            fi
          done
          echo "All $MAX_ATTEMPTS attempts failed."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 10. Find artifact ────────────────────────────────────────────────────
      - name: Find artifact
        id: find_artifact
        shell: bash
        run: |
          echo "=== Bundle tree ==="
          find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null | sort
          echo "==================="

          ARTIFACT=""

          if [ "${{ matrix.platform }}" = "windows" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/nsis/*.exe" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/msi/*.msi" -type f 2>/dev/null | head -1)
            fi

          elif [ "${{ matrix.platform }}" = "macos" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/dmg/*.dmg" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/macos/*.app" -type d 2>/dev/null | head -1)
            fi

          elif [ "${{ matrix.platform }}" = "linux" ]; then
            ARTIFACT=$(find src-tauri/target -path "*/bundle/appimage/*.AppImage" -type f 2>/dev/null | head -1)
            if [ -z "$ARTIFACT" ]; then
              ARTIFACT=$(find src-tauri/target -path "*/bundle/deb/*.deb" -type f 2>/dev/null | head -1)
            fi
          fi

          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No artifact found for ${{ matrix.platform }}"
            exit 1
          fi

          echo "Found: $ARTIFACT"
          echo "artifact_path=$ARTIFACT" >> $GITHUB_OUTPUT
          echo "artifact_name=$(basename $ARTIFACT)" >> $GITHUB_OUTPUT

      # ── 11. Sanity-check artifact size ───────────────────────────────────────
      # FIX: a build can "succeed" (exit code 0) while still producing a
      # truncated or corrupt bundle — this has been observed specifically
      # with macOS DMGs after the hdiutil flakiness above. Rather than
      # silently uploading a broken file that LOOKS like a successful build
      # to players, we fail the job loudly here if the artifact is
      # suspiciously small for its platform.
      - name: Verify artifact size
        shell: bash
        run: |
          ARTIFACT="${{ steps.find_artifact.outputs.artifact_path }}"
          MIN_SIZE=${{ matrix.min_size_bytes }}

          if [ -d "$ARTIFACT" ]; then
            SIZE=$(du -sb "$ARTIFACT" 2>/dev/null | cut -f1 || du -sk "$ARTIFACT" | cut -f1 | awk '{print $1*1024}')
          else
            SIZE=$(wc -c < "$ARTIFACT")
          fi

          echo "Artifact size: $SIZE bytes (minimum expected: $MIN_SIZE bytes)"

          if [ "$SIZE" -lt "$MIN_SIZE" ]; then
            echo "ERROR: Artifact is suspiciously small ($SIZE bytes < $MIN_SIZE byte minimum)."
            echo "This usually means the bundle step silently produced a truncated"
            echo "or incomplete build. Failing here instead of shipping a broken file."
            exit 1
          fi

          echo "✓ Size check passed."

      # ── 12. ZIP artifact ─────────────────────────────────────────────────────
      - name: Find and ZIP artifact (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $artifact = "${{ steps.find_artifact.outputs.artifact_path }}"
          $zipName = "launcher-${{ github.event.inputs.game_id }}-windows.zip"
          Compress-Archive -Path $artifact -DestinationPath $zipName -Force

          $size = (Get-Item $zipName).Length
          Write-Host "ZIP: $zipName ($size bytes)"
          "zip_path=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: ZIP artifact (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ARTIFACT="${{ steps.find_artifact.outputs.artifact_path }}"
          ZIP_NAME="launcher-${{ github.event.inputs.game_id }}-${{ matrix.platform }}.zip"

          if [ "${{ matrix.platform }}" = "linux" ]; then
            chmod +x "$ARTIFACT"
          fi

          if [[ "$ARTIFACT" == *.app ]]; then
            zip -r "$ZIP_NAME" "$ARTIFACT"
          else
            zip -j "$ZIP_NAME" "$ARTIFACT"
          fi

          SIZE=$(wc -c < "$ZIP_NAME")
          echo "ZIP: $ZIP_NAME ($SIZE bytes)"
          echo "zip_path=$ZIP_NAME" >> $GITHUB_ENV

      # ── 13. Upload to R2 (Windows) ────────────────────────────────────────────
      - name: Upload to R2 (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $zipPath = "${{ env.zip_path }}"
          $gameId  = "${{ github.event.inputs.game_id }}"
          $secret  = "${{ secrets.WORKER_SECRET }}"
          $url     = "${{ secrets.WORKER_URL }}/upload/windows"

          $response = curl.exe -s -o response_body.txt -w "%{http_code}" `
            -X POST `
            -H "X-Worker-Secret: $secret" `
            -F "game_id=$gameId" `
            -F "file=@$zipPath;type=application/zip" `
            $url

          $body = Get-Content response_body.txt -Raw
          Write-Host "Worker response ($response): $body"

          if ($response -ne "201") {
            Write-Error "ERROR: Upload failed with HTTP $response"
            exit 1
          }

          Write-Host "Upload successful!"

      # ── 14. Upload to R2 (Unix) ───────────────────────────────────────────────
      - name: Upload to R2 (Unix)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          ZIP_PATH="${{ env.zip_path }}"
          GAME_ID="${{ github.event.inputs.game_id }}"
          PLATFORM="${{ matrix.platform }}"
          SECRET="${{ secrets.WORKER_SECRET }}"
          WORKER_URL="${{ secrets.WORKER_URL }}"

          HTTP_CODE=$(curl -s \
            -o response_body.txt \
            -w "%{http_code}" \
            -X POST \
            -H "X-Worker-Secret: $SECRET" \
            -F "game_id=$GAME_ID" \
            -F "file=@$ZIP_PATH;type=application/zip" \
            "$WORKER_URL/upload/$PLATFORM")

          BODY=$(cat response_body.txt)
          echo "Worker response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Upload successful!"

      # ── 15. Notify Worker — success ───────────────────────────────────────────
      - name: Notify Worker — success
        if: success()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"success\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"

      # ── 16. Notify Worker — failure ───────────────────────────────────────────
      - name: Notify Worker — failure
        if: failure()
        shell: bash
        run: |
          curl -s -X POST \
            -H "X-Worker-Secret: ${{ secrets.WORKER_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"gameId\":\"${{ github.event.inputs.game_id }}\",\"platform\":\"${{ matrix.platform }}\",\"status\":\"failed\",\"error\":\"Build failed. Check Actions log.\"}" \
            "${{ secrets.WORKER_URL }}/internal/build-complete"
